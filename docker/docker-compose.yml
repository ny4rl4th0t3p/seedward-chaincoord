services:

  coordd:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint: ["/coordd-dev-entrypoint.sh"]
    volumes:
      - coordd-dev-data:/data
      - ./coordd-dev-entrypoint.sh:/coordd-dev-entrypoint.sh:ro
    environment:
      COORD_LISTEN_ADDR: ":8080"
      COORD_DB_PATH: "/data/coord.db"
      COORD_AUDIT_LOG_PATH: "/data/audit.jsonl"
      COORD_FILES_PATH: "/data/genesis"
      COORD_LOG_LEVEL: "info"
      # Allow requests from the Next.js dev server (SSE EventSource connects directly).
      COORD_CORS_ORIGINS: "http://localhost:3000"
      COORD_INSECURE_NO_TLS: "true"
      COORD_INSECURE_NO_SSRF_CHECK: "false"
      COORD_LAUNCH_POLICY: "open"
      COORD_GENESIS_HOST_MODE: "false"
      COORD_AUDIT_PRIVATE_KEY_FILE: "/data/audit_key"
      COORD_JWT_PRIVATE_KEY_FILE: "/data/jwt_key"
      # Required to access the admin panel (/admin) in the web UI.
      # Set this to the Cosmos Hub (or other coordinator chain) address you will
      # sign in with. Without it, no one can manage the coordinator allowlist.
      # Example: COORD_ADMIN_ADDRESSES=cosmos1abc...xyz
      COORD_ADMIN_ADDRESSES: "${COORD_ADMIN_ADDRESSES:-}"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 5s
      retries: 20

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    depends_on:
      coordd:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  coordd-dev-data: