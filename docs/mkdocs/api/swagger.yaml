basePath: /
definitions:
  api.addCoordinatorRequest:
    properties:
      address:
        type: string
    type: object
  api.auditPubKeyResponse:
    properties:
      public_key:
        type: string
    type: object
  api.auditResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/ports.AuditEvent'
        type: array
    type: object
  api.chainHintJSON:
    properties:
      bech32_prefix:
        type: string
      chain_id:
        type: string
      chain_name:
        type: string
      denom:
        type: string
    type: object
  api.chainRecordJSON:
    properties:
      application_window_open:
        type: string
      bech32_prefix:
        type: string
      binary_name:
        type: string
      binary_sha256:
        type: string
      binary_version:
        type: string
      chain_id:
        type: string
      chain_name:
        type: string
      denom:
        type: string
      genesis_time:
        type: string
      gentx_deadline:
        type: string
      max_commission_change_rate:
        type: string
      max_commission_rate:
        type: string
      min_self_delegation:
        type: string
      min_validator_count:
        type: integer
      repo_commit:
        type: string
      repo_url:
        type: string
    type: object
  api.challengeRequest:
    properties:
      operator_address:
        example: cosmos1abcdef...
        type: string
    type: object
  api.challengeResponse:
    properties:
      challenge:
        type: string
    type: object
  api.committeeJSON:
    properties:
      created_at:
        type: string
      creation_signature:
        type: string
      id:
        type: string
      lead_address:
        type: string
      members:
        items:
          $ref: '#/definitions/api.committeeMemberJSON'
        type: array
      threshold_m:
        type: integer
      total_n:
        type: integer
    type: object
  api.committeeMemberJSON:
    properties:
      address:
        type: string
      moniker:
        type: string
      pub_key_b64:
        type: string
    type: object
  api.committeeRequestJSON:
    properties:
      creation_signature:
        type: string
      lead_address:
        type: string
      members:
        items:
          $ref: '#/definitions/api.committeeMemberJSON'
        type: array
      threshold_m:
        type: integer
      total_n:
        type: integer
    type: object
  api.coordinatorAllowlistEntryJSON:
    properties:
      added_at:
        type: string
      added_by:
        type: string
      address:
        type: string
    type: object
  api.createLaunchRequest:
    properties:
      allowlist:
        items:
          type: string
        type: array
      committee:
        $ref: '#/definitions/api.committeeRequestJSON'
      launch_type:
        example: MAINNET
        type: string
      record:
        $ref: '#/definitions/api.chainRecordJSON'
      visibility:
        example: PUBLIC
        type: string
    type: object
  api.dashboardJSON:
    properties:
      chain_id:
        type: string
      confirmed_ready:
        type: integer
      final_genesis_sha256:
        type: string
      genesis_time:
        type: string
      launch_id:
        type: string
      status:
        type: string
      threshold_status:
        type: string
      total_approved:
        type: integer
      validators:
        items:
          $ref: '#/definitions/api.validatorReadinessJSON'
        type: array
      voting_power_confirmed:
        type: number
    type: object
  api.errorBody:
    properties:
      code:
        type: string
      invariants:
        items:
          $ref: '#/definitions/api.invariantResultJSON'
        type: array
      message:
        type: string
      request_id:
        type: string
    type: object
  api.errorEnvelope:
    properties:
      error:
        $ref: '#/definitions/api.errorBody'
    type: object
  api.genesisHashResponse:
    properties:
      final_sha256:
        type: string
      initial_sha256:
        type: string
    type: object
  api.genesisUploadResponse:
    properties:
      sha256:
        type: string
    type: object
  api.gentxEntry:
    properties:
      consensus_pubkey:
        type: string
      gentx:
        type: object
      join_request_id:
        type: string
      operator_address:
        type: string
    type: object
  api.gentxsResponse:
    properties:
      gentxs:
        items:
          $ref: '#/definitions/api.gentxEntry'
        type: array
    type: object
  api.invariantResultJSON:
    properties:
      invariant:
        type: string
      ok:
        type: boolean
      reason:
        type: string
    type: object
  api.joinRequestJSON:
    properties:
      approved_by_proposal:
        type: string
      consensus_pubkey:
        type: string
      gentx:
        type: object
      id:
        type: string
      launch_id:
        type: string
      memo:
        type: string
      operator_address:
        type: string
      peer_address:
        type: string
      rejection_reason:
        type: string
      rpc_endpoint:
        type: string
      status:
        type: string
      submitted_at:
        type: string
    type: object
  api.launchJSON:
    properties:
      created_at:
        type: string
      final_genesis_sha256:
        type: string
      id:
        type: string
      initial_genesis_sha256:
        type: string
      launch_type:
        type: string
      monitor_rpc_url:
        type: string
      record:
        $ref: '#/definitions/api.chainRecordJSON'
      status:
        type: string
      updated_at:
        type: string
      visibility:
        type: string
    type: object
  api.pageEnvelope-array_api_coordinatorAllowlistEntryJSON:
    properties:
      items:
        items:
          $ref: '#/definitions/api.coordinatorAllowlistEntryJSON'
        type: array
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  api.pageEnvelope-array_api_joinRequestJSON:
    properties:
      items:
        items:
          $ref: '#/definitions/api.joinRequestJSON'
        type: array
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  api.pageEnvelope-array_api_launchJSON:
    properties:
      items:
        items:
          $ref: '#/definitions/api.launchJSON'
        type: array
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  api.pageEnvelope-array_api_proposalJSON:
    properties:
      items:
        items:
          $ref: '#/definitions/api.proposalJSON'
        type: array
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  api.patchLaunchRequest:
    properties:
      allowlist:
        items:
          type: string
        type: array
      binary_sha256:
        type: string
      binary_version:
        type: string
      chain_name:
        type: string
      genesis_time:
        type: string
      min_validator_count:
        type: integer
      monitor_rpc_url:
        type: string
      repo_commit:
        type: string
      repo_url:
        type: string
      visibility:
        example: PUBLIC
        type: string
    type: object
  api.peerJSON:
    properties:
      operator_address:
        type: string
      peer_address:
        type: string
    type: object
  api.peersResponse:
    properties:
      peers:
        items:
          $ref: '#/definitions/api.peerJSON'
        type: array
    type: object
  api.proposalJSON:
    properties:
      action_type:
        type: string
      executed_at:
        type: string
      id:
        type: string
      launch_id:
        type: string
      payload:
        type: object
      proposed_at:
        type: string
      proposed_by:
        type: string
      signatures:
        items:
          $ref: '#/definitions/api.signatureEntryJSON'
        type: array
      status:
        type: string
      ttl_expires:
        type: string
    type: object
  api.readinessConfirmJSON:
    properties:
      confirmed_at:
        type: string
      id:
        type: string
      launch_id:
        type: string
    type: object
  api.sessionInfoJSON:
    properties:
      expires_at:
        type: string
      is_coordinator:
        type: boolean
      operator_address:
        type: string
    type: object
  api.signatureEntryJSON:
    properties:
      coordinator_address:
        type: string
      decision:
        type: string
      timestamp:
        type: string
    type: object
  api.tokenResponse:
    properties:
      token:
        type: string
    type: object
  api.validatorReadinessJSON:
    properties:
      binary_hash_confirmed:
        type: string
      genesis_hash_confirmed:
        type: string
      is_ready:
        type: boolean
      join_request_id:
        type: string
      last_confirmed_at:
        type: string
      moniker:
        type: string
      operator_address:
        type: string
      voting_power_pct:
        type: number
    type: object
  ports.AuditEvent:
    properties:
      event_name:
        description: EventName matches domain.DomainEvent.EventName()
        type: string
      launch_id:
        description: LaunchID scopes the event to a specific launch for per-launch
          filtering.
        type: string
      occurred_at:
        type: string
      payload:
        description: |-
          Payload is the canonical JSON of the domain event, stored as raw JSON
          so audit entries are human-readable without base64 decoding.
        type: object
      prev_hash:
        description: |-
          PrevHash is the SHA-256 hex digest of the previous entry's raw JSON bytes
          (the full marshaled line, signature included). Empty for the first entry.
          Included in the signature of the current entry so it cannot be silently altered.
        type: string
      signature:
        description: |-
          Signature is a base64 Ed25519 signature over the canonical JSON of this entry
          (excluding the signature field itself), signed by the server's audit key.
        type: string
    type: object
  proposal.ActionType:
    enum:
    - APPROVE_VALIDATOR
    - REJECT_VALIDATOR
    - REMOVE_APPROVED_VALIDATOR
    - ADD_GENESIS_ACCOUNT
    - REMOVE_GENESIS_ACCOUNT
    - MODIFY_GENESIS_ACCOUNT
    - PUBLISH_CHAIN_RECORD
    - CLOSE_APPLICATION_WINDOW
    - PUBLISH_GENESIS
    - UPDATE_GENESIS_TIME
    - REPLACE_COMMITTEE_MEMBER
    - REVISE_GENESIS
    - EXPAND_COMMITTEE
    - SHRINK_COMMITTEE
    type: string
    x-enum-varnames:
    - ActionApproveValidator
    - ActionRejectValidator
    - ActionRemoveApprovedValidator
    - ActionAddGenesisAccount
    - ActionRemoveGenesisAccount
    - ActionModifyGenesisAccount
    - ActionPublishChainRecord
    - ActionCloseApplicationWindow
    - ActionPublishGenesis
    - ActionUpdateGenesisTime
    - ActionReplaceCommitteeMember
    - ActionReviseGenesis
    - ActionExpandCommittee
    - ActionShrinkCommittee
  proposal.Decision:
    enum:
    - SIGN
    - VETO
    type: string
    x-enum-varnames:
    - DecisionSign
    - DecisionVeto
  services.ConfirmInput:
    properties:
      binary_hash_confirmed:
        type: string
      genesis_hash_confirmed:
        type: string
      nonce:
        type: string
      operator_address:
        type: string
      pubkey_b64:
        description: |-
          PubKeyB64 is the operator's secp256k1 compressed public key (base64, 33 bytes) used to verify the
          confirmation signature.
        type: string
      signature:
        type: string
      timestamp:
        type: string
    type: object
  services.RaiseInput:
    properties:
      action_type:
        $ref: '#/definitions/proposal.ActionType'
      coordinator_address:
        type: string
      nonce:
        type: string
      payload:
        type: object
      signature:
        type: string
      timestamp:
        type: string
    type: object
  services.SignInput:
    properties:
      coordinator_address:
        type: string
      decision:
        $ref: '#/definitions/proposal.Decision'
      nonce:
        type: string
      signature:
        type: string
      timestamp:
        type: string
    type: object
  services.SubmitInput:
    properties:
      chain_id:
        type: string
      gentx:
        type: object
      memo:
        type: string
      nonce:
        type: string
      operator_address:
        type: string
      peer_address:
        type: string
      pubkey_b64:
        description: |-
          PubKeyB64 is the operator's secp256k1 compressed public key (base64, 33 bytes) used to verify the
          request signature. Distinct from the consensus key, which is extracted from the gentx.
        type: string
      rpc_endpoint:
        type: string
      signature:
        type: string
      timestamp:
        type: string
    type: object
  services.VerifyChallengeInput:
    properties:
      challenge:
        type: string
      nonce:
        description: |-
          Nonce is included in the signed bytes (replay protection) and consumed once
          per (operator, nonce) by the nonce store.
        type: string
      operator_address:
        type: string
      pubkey_b64:
        description: |-
          PubKeyB64 is the caller's secp256k1 compressed public key (33 bytes, base64-encoded).
          Required so the server can verify the signature — bech32 addresses are hashes
          and the public key cannot be recovered from them.
          Stripped before signing — not included in the canonical bytes.
        type: string
      signature:
        description: Signature is stripped before signing — not included in the canonical
          bytes.
        type: string
      timestamp:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Chain launch coordination server. Coordinators and validators authenticate
    via secp256k1 challenge-response (ADR-036)
  title: ChainCoord API
  version: "1.0"
paths:
  /admin/coordinators:
    get:
      description: Returns all addresses on the coordinator allowlist. Admin only.
        Paginated.
      parameters:
      - description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.pageEnvelope-array_api_coordinatorAllowlistEntryJSON'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: List coordinator allowlist
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Adds an address to the coordinator allowlist. Admin only. Idempotent.
      parameters:
      - description: Address to add
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.addCoordinatorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.coordinatorAllowlistEntryJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Add coordinator to allowlist
      tags:
      - admin
  /admin/coordinators/{address}:
    delete:
      description: Removes an address from the coordinator allowlist. Admin only.
      parameters:
      - description: Operator address to remove
        in: path
        name: address
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Remove coordinator from allowlist
      tags:
      - admin
  /admin/sessions/{address}:
    delete:
      parameters:
      - description: Operator address
        in: path
        name: address
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Revoke all sessions for an operator (admin)
      tags:
      - admin
  /audit/pubkey:
    get:
      description: Returns the server's Ed25519 public key for offline audit log signature
        verification.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.auditPubKeyResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Get audit public key
      tags:
      - audit
  /auth/challenge:
    post:
      consumes:
      - application/json
      description: Issues a short-lived challenge for the given operator address.
        Rate-limited to 10 req/IP/min and 5 req/operator/5min.
      parameters:
      - description: Operator address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.challengeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.challengeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Request an auth challenge
      tags:
      - auth
  /auth/session:
    delete:
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Revoke the current session
      tags:
      - auth
    get:
      description: Returns the operator address, expiry, and coordinator status of
        the supplied session token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.sessionInfoJSON'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Get current session info
      tags:
      - auth
  /auth/sessions/all:
    delete:
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Revoke all sessions for the current operator
      tags:
      - auth
  /auth/verify:
    post:
      consumes:
      - application/json
      description: Validates the signed challenge response and issues a session token.
      parameters:
      - description: Signed challenge payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.VerifyChallengeInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.tokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Verify a signed challenge
      tags:
      - auth
  /committee/{launch_id}:
    get:
      parameters:
      - description: Launch UUID
        in: path
        name: launch_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.committeeJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Get committee
      tags:
      - committee
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /launch:
    post:
      consumes:
      - application/json
      description: Creates a new chain launch. When launch_policy is "restricted",
        the caller must be on the coordinator allowlist.
      parameters:
      - description: Launch definition
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.createLaunchRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.launchJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Create a launch
      tags:
      - launches
  /launch/{id}:
    get:
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.launchJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Get a launch
      tags:
      - launches
    patch:
      consumes:
      - application/json
      description: Partially updates mutable fields on a DRAFT launch. Coordinator
        only.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Partial update (all fields optional)
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.patchLaunchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.launchJSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Update a launch
      tags:
      - launches
  /launch/{id}/audit:
    get:
      description: Returns all audit log entries for a launch. Visibility-gated (same
        rules as GET /launch/{id}).
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.auditResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Get audit log
      tags:
      - audit
  /launch/{id}/cancel:
    post:
      description: |-
        Transitions a launch to CANCELED. Only the committee lead may call this.
        No quorum required — cancellation is a single-actor emergency action.
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.launchJSON'
