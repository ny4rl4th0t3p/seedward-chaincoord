      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Raw genesis JSON (host mode)
          schema:
            type: string
        "302":
          description: Redirect to external genesis URL (attestor mode)
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      summary: Download genesis file
      tags:
      - genesis
    post:
      consumes:
      - application/json
      - application/octet-stream
      description: |-
        Committee members only.
        Attestor mode (default): register external URL + SHA-256.
        Host mode: upload raw bytes (requires COORD_GENESIS_HOST_MODE=true).
      parameters:
      - description: Launch UUID
        in: path
        name: id
        required: true
        type: string
      - description: Genesis type
        enum:
        - initial
        - final
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.genesisUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorEnvelope'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/api.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Upload genesis file
      tags:
      - genesis
