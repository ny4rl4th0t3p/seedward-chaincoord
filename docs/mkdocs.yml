site_name: seedward-chaincoord
site_description: Self-hosted coordination server for Cosmos SDK chain genesis launches.
repo_url: https://github.com/ny4rl4th0t3p/seedward-chaincoord
repo_name: ny4rl4th0t3p/seedward-chaincoord
docs_dir: ./mkdocs

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Overview: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Dev Environment: getting-started/dev-environment.md
      - Smoke Test: getting-started/smoke-test.md
  - Concepts:
      - Overview: concepts/overview.md
      - Roles: concepts/roles.md
      - Launch Lifecycle: concepts/lifecycle.md
      - Proposals & M-of-N: concepts/proposals.md
  - Reference:
      - Setup & Configuration: reference/setup.md
      - API: reference/api.md
      - CLI: reference/cli.md
      - Audit Log: reference/audit.md

plugins:
  - search
  - swagger-ui-tag

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true