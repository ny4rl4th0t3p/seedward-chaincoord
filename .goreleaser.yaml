project_name: seedward-chaincoord

builds:
  - id: coordd
    main: ./cmd/coordd
    binary: coordd
    ldflags:
      - -X github.com/ny4rl4th0t3p/seedward-chaincoord/cmd/coordd/cmd.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: archive
    builds:
      - coordd
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  # Regexps are matched against the whole `<abbrev-hash> <subject>` changelog entry, so each must
  # skip the leading hash with `^.*?` before the conventional-commit type. Anchoring at `^feat`
  # never matches (the line starts with the hash) and everything falls through to "Other".
  filters:
    exclude:
      - '^.*?chore(\(.+?\))?!?:'
      - '^.*?ci(\(.+?\))?!?:'
      - '^.*?Merge (pull request|branch)'
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+?\))?!?:'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+?\))?!?:'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+?\))?!?:'
      order: 2
    - title: Refactors
      regexp: '^.*?refactor(\(.+?\))?!?:'
      order: 3
    - title: Documentation
      regexp: '^.*?docs(\(.+?\))?!?:'
      order: 4
    - title: Other
      order: 999

release:
  github:
    owner: ny4rl4th0t3p
    name: seedward-chaincoord
