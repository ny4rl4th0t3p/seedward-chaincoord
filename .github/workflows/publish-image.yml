name: Publish image

# Build + push the coordd image to GHCR on version tags. Delete/prune later via the
# package UI, the API, or a retention policy — nothing here is irreversible.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/seedward-chaincoord
          # latest=auto tags `latest` only for the highest *stable* release, never a pre-release (rc).
          flavor: latest=auto
          tags: |
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          # Stamp the image version; overrides the "dev" default in the Dockerfile's ARG so
          # `coordd --version` reports the release. Use metadata-action's computed version
          # (the `v`-stripped semver, e.g. 1.0.0-rc1) so it matches the image tag exactly and
          # the goreleaser archive binaries.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}