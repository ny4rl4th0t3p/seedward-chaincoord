name: Deploy MkDocs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Deploy
        # strict mode is set in mkdocs.yml, so a broken nav/link fails this build
        # before it publishes.
        run: mkdocs gh-deploy --force -f docs/mkdocs.yml
